# spellbook.toml — the single source of truth for the Book of Spells.
#
# It names every grimoire we gather (clone into temp-repos/) AND which spells we
# transcribe from each into our own skills/ folder.
#
#   gather-reliquaries.py  reads `url` / `repo` to clone or refresh each vault.
#   transcribe-spells.py   reads the rest to flatten chosen spells into skills/.
#
# ── The Trust Gate ───────────────────────────────────────────────────────────
# We import only from accountable houses. A source qualifies if it is either:
#   • an established GitHub Organization — verified, OR old-and-broad
#     (≥5 yrs and ≥30 public repos); a 5-minute vanity org does not count, OR
#   • an individual on a short, hand-vetted allowlist (rare; named explicitly).
# Popularity (stars) is NOT a gate — viral individual repos are still street
# magic. The `trust` field below records why each source was let in.
#
# ── The Scrying Ward ─────────────────────────────────────────────────────────
# We pull the latest each run (upstream keeps spells current), but transcribe
# *scries* every incoming SKILL.md for dark magic (prompt-injection, secret
# exfiltration, pipe-to-shell). A banished spell never enters the Book and fails
# the run. The gate buys accountability; the Ward catches tampering.
#
# Each [[source]]:
#   name       — provider prefix for transcribed spells (google-gcloud, openai-pdf)
#   url        — git repository to clone into temp-repos/
#   repo       — folder name under temp-repos/ (defaults to the url's basename)
#   trust      — why this source passes the gate (documentation)
#   transcribe — false to gather-for-reference only, never flattened into skills/
#   roots      — only transcribe SKILL.md found beneath these paths (default: whole repo)
#   exclude    — skill basenames OR repo-relative globs to skip

[[source]]
name = "anthropic"
url = "https://github.com/anthropics/skills"
repo = "anthropic-skills"
trust = "verified-org"   # 6 yrs, 89 repos — the official Agent Skills house
roots = ["skills"]       # (the repo's top-level template/ is left out)

[[source]]
name = "openai"
url = "https://github.com/openai/skills"
repo = "openai-skills"
trust = "verified-org"
# .curated holds the user-facing spells; .system holds this house's meta-skills
# (skill-creator, skill-installer, plugin-creator) — the tools a Codex-conduit
# wizard uses to forge spells of their own. We take both, but drop .system's
# non-meta extras and its duplicate openai-docs (the .curated copy wins).
roots = ["skills/.curated", "skills/.system"]
exclude = ["skills/.system/openai-docs", "skills/.system/imagegen"]

